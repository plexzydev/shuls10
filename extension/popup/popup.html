<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shuls Loyalty</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <div class="login-glow"></div>
            <div class="login-content">
                <div class="logo-mark"><img src="../icons/logo.png" alt="Shuls" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;"></div>
                <h1 class="brand">SHULS</h1>
                <p class="brand-sub">LOYALTY SYSTEM</p>
                <button id="login-btn" class="kick-login-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    <span>Conectar con Kick</span>
                </button>
                <p class="login-hint">Verificación segura via Kick OAuth</p>
            </div>
        </div>

        <!-- Dashboard Screen -->
        <div id="dashboard-screen" class="screen">
            <!-- Header -->
            <div class="header">
                <div class="header-left">
                    <div class="avatar" id="avatar-letter">S</div>
                    <div class="header-info">
                        <span class="header-name" id="display-name">-</span>
                        <div class="header-status">
                            <span class="status-dot" id="live-dot"></span>
                            <span class="status-text" id="live-text">Offline</span>
                        </div>
                    </div>
                </div>
                <button id="logout-btn" class="btn-icon" title="Salir">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>

            <div class="body">
                <!-- Points Card -->
                <div class="points-card">
                    <div class="points-top">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 0 1 0 4H8"/><path d="M12 18V6"/></svg>
                        <span class="points-label">PUNTOS</span>
                    </div>
                    <span class="points-value" id="points">0</span>
                    <span class="points-hint" id="earn-rate">Mirá el stream para ganar</span>
                </div>

                <!-- Role Badge -->
                <div class="role-badge" id="badge-display" style="display:none;">
                    <span class="role-icon" id="badge-icon"></span>
                    <span class="role-label" id="badge-label"></span>
                </div>

                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat">
                        <div class="stat-icon-wrap green">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        </div>
                        <span class="stat-val" id="watch-time">0m</span>
                        <span class="stat-label">Watch</span>
                    </div>
                    <div class="stat">
                        <div class="stat-icon-wrap orange">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                        </div>
                        <span class="stat-val" id="streak">0</span>
                        <span class="stat-label">Racha</span>
                    </div>
                    <div class="stat">
                        <div class="stat-icon-wrap yellow">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 9 7 9 7"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5C17 4 15 7 15 7"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                        </div>
                        <span class="stat-val" id="longest-streak">0</span>
                        <span class="stat-label">Mejor</span>
                    </div>
                </div>

                <!-- Channel Config -->
                <div class="section">
                    <div class="section-header">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                        <span>Canal de Kick</span>
                    </div>
                    <div class="channel-row">
                        <span class="channel-prefix">kick.com/</span>
                        <input type="text" id="channel-input" class="channel-input" placeholder="shuls10" value="shuls10">
                        <button id="save-channel-btn" class="btn-sm">Guardar</button>
                    </div>
                </div>

                <!-- Links -->
                <div class="links">
                    <a href="http://localhost:5173/dashboard" target="_blank" class="link-btn">
                        <div class="link-icon green"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></div>
                        <span>Dashboard</span>
                        <svg class="link-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                    </a>
                    <a href="http://localhost:5173/rewards" target="_blank" class="link-btn">
                        <div class="link-icon gold"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg></div>
                        <span>Rewards</span>
                        <svg class="link-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                    </a>
                    <a href="http://localhost:5173/profile" target="_blank" class="link-btn">
                        <div class="link-icon blue"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
                        <span>Perfil</span>
                        <svg class="link-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                    </a>
                </div>
            </div>

            <div class="footer">Shuls Loyalty v1.0</div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
